<div class="rounded-3xl border border-white/10 bg-slate-900/70 p-4 shadow-xl">
  <input
    [(ngModel)]="searchText"
    type="text"
    placeholder="Search users by name, username or email"
    class="w-full rounded-2xl border border-white/15 bg-slate-950/80 px-4 py-3 text-sm text-white outline-none"
  />
</div>

@if (getFilteredUsers().length === 0) {
  <div class="mt-4 rounded-2xl border border-white/10 bg-white/5 p-4 text-sm text-slate-300">
    No users found.
  </div>
} @else {
  <div class="mt-4 grid gap-4 sm:grid-cols-2 xl:grid-cols-3">
    @for (user of getFilteredUsers(); track user.idUser) {
      <article class="rounded-2xl border border-white/10 bg-slate-900/60 p-4">
        <div class="flex items-center gap-3">
          <button
            type="button"
            (click)="startChat(user)"
            class="rounded-full focus:outline-none focus:ring-2 focus:ring-cyan-400/40"
            title="Message this user"
          >
            <img [src]="getPhoto(user)" alt="User picture" class="h-12 w-12 rounded-full object-cover" />
          </button>

          <div>
            <h3 class="text-base font-semibold text-white">{{ getDisplayName(user) }}</h3>
            <p class="text-xs text-slate-400">{{ user.account?.email || 'No email' }}</p>
          </div>
        </div>

        <p class="mt-3 text-xs text-cyan-300">Click picture to start or continue chat.</p>
      </article>
    }
  </div>
}
